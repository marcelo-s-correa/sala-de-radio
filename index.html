<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REDE RÁDIO - 1704</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .radio-container {
            background: #333;
            padding: 30px;
            border-radius: 20px;
            border: 4px solid #444;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 320px;
        }

        .display {
            background: #000;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #111;
            margin-bottom: 20px;
        }

        input {
            background: transparent;
            border: none;
            color: #0f0;
            font-family: monospace;
            font-size: 1.5rem;
            text-align: center;
            width: 100%;
            outline: none;
        }

        .ptt-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: radial-gradient(#e74c3c, #c0392b);
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px #992d22;
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .ptt-btn:active {
            box-shadow: 0 2px #992d22;
            transform: translateY(4px);
            background: radial-gradient(#c0392b, #a93226);
        }

        .ptt-btn:disabled {
            background: #555;
            box-shadow: none;
            cursor: not-allowed;
        }

        .list-container {
            width: 100%;
            margin-top: 20px;
            text-align: left;
            font-size: 0.8rem;
            border-top: 1px solid #444;
            padding-top: 10px;
        }

        .user-item {
            color: #aaa;
            margin: 3px 0;
            display: flex;
            justify-content: space-between;
        }

        .online-dot {
            color: #0f0;
        }
    </style>
</head>

<body>

    <div class="radio-container">
        <div style="font-size: 0.7rem; color: #888; margin-bottom: 10px;">CANAL: <span id="roomDisplay">1704</span>
        </div>
        <div class="display">
            <label style="font-size: 0.7rem; color: #444; display: block; margin-bottom: 5px;">IDENTIFICAÇÃO</label>
            <input type="text" id="vtrInput" value="54-7967">
        </div>

        <button class="ptt-btn" id="pttBtn" disabled>BUSCANDO VAGA</button>
        <p id="status" style="color: #666; font-size: 0.7rem; margin-top: 15px;">AGUARDANDO MICROFONE...</p>

        <div class="list-container">
            <div style="font-weight: bold; margin-bottom: 5px; color: #888;">NA ESCUTA (MÁX 5):</div>
            <div id="userList"></div>
        </div>
    </div>

    <script>
        const ccirTable = { '1': 1124, '2': 1197, '3': 1275, '4': 1358, '5': 1446, '6': 1540, '7': 1640, '8': 1747, '9': 1860, '0': 1981, 'R': 2110 };
        const SALA_BASE = "PMERJ-1704-SLOT-";
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        const pttBtn = document.getElementById('pttBtn');
        const vtrInput = document.getElementById('vtrInput');
        const statusText = document.getElementById('status');
        const userList = document.getElementById('userList');

        let peer = null;
        let localStream;
        let meuSlot = 0;
        let chamadasAtivas = {};

        // 1. Lógica de Áudio (Corte Seco)
        async function playSelCall(digits) {
            const duration = 0.1;
            let startTime = audioCtx.currentTime;
            let cleanDigits = digits.replace(/\D/g, '').split('');
            let processed = [];

            for (let i = 0; i < cleanDigits.length; i++) {
                processed.push(i > 0 && cleanDigits[i] === cleanDigits[i - 1] ? 'R' : cleanDigits[i]);
            }

            processed.forEach(digit => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.value = ccirTable[digit];
                osc.type = 'sine';

                // Corte seco para som de rádio real
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.setValueAtTime(0.5, startTime + 0.002);
                gain.gain.setValueAtTime(0.5, startTime + duration - 0.002);
                gain.gain.setValueAtTime(0, startTime + duration);

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start(startTime);
                osc.stop(startTime + duration);
                startTime += duration;
            });

            return new Promise(resolve => setTimeout(resolve, processed.length * 100));
        }

        // 2. Inicialização de Rede e Microfone
        async function iniciar() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                statusText.innerText = "BUSCANDO SLOT DISPONÍVEL...";
                encontrarVaga();
            } catch (err) {
                statusText.innerText = "ERRO: ACESSO AO MICROFONE NEGADO";
                statusText.style.color = "red";
            }
        }

        async function encontrarVaga() {
            for (let i = 1; i <= 5; i++) {
                const idTentativa = SALA_BASE + i;
                const tempPeer = new Peer(idTentativa);

                const ocupado = await new Promise((resolve) => {
                    tempPeer.on('open', () => resolve(false));
                    tempPeer.on('error', (err) => resolve(true));
                });

                if (!ocupado) {
                    peer = tempPeer;
                    meuSlot = i;
                    configurarPeer();
                    return;
                } else {
                    tempPeer.destroy();
                }
            }
            statusText.innerText = "SALA CHEIA (MÁX 5)";
        }

        function configurarPeer() {
            statusText.innerText = "ONLINE - SLOT " + meuSlot;
            pttBtn.innerText = "PTT";
            pttBtn.disabled = false;

            addUserToList(vtrInput.value + " (Você)");

            // Receber áudio
            peer.on('call', call => {
                call.answer();
                call.on('stream', remoteStream => {
                    const audio = new Audio();
                    audio.srcObject = remoteStream;
                    audio.play();
                });
            });

            // Tentar conectar nos outros slots a cada 5 segundos
            setInterval(conectarAosOutros, 5000);
        }

        function conectarAosOutros() {
            for (let i = 1; i <= 5; i++) {
                if (i === meuSlot) continue;
                const destinoId = SALA_BASE + i;

                // Se não estamos chamando esse slot, tentamos chamar
                if (!chamadasAtivas[destinoId]) {
                    const call = peer.call(destinoId, localStream);
                    if (call) {
                        chamadasAtivas[destinoId] = call;
                        call.on('stream', remoteStream => {
                            const audio = new Audio();
                            audio.srcObject = remoteStream;
                            audio.play();
                        });
                        call.on('close', () => delete chamadasAtivas[destinoId]);
                        call.on('error', () => delete chamadasAtivas[destinoId]);
                    }
                }
            }
        }

        // 3. PTT
        pttBtn.addEventListener('mousedown', async () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            statusText.innerText = "SINALIZANDO...";
            await playSelCall(vtrInput.value);
            statusText.innerText = "TRANSMITINDO...";
            statusText.style.color = "#e74c3c";
        });

        pttBtn.addEventListener('mouseup', () => {
            statusText.innerText = "ONLINE - SLOT " + meuSlot;
            statusText.style.color = "#666";
        });

        function addUserToList(name) {
            const div = document.createElement('div');
            div.className = "user-item";
            div.innerHTML = `<span>${name}</span> <span class="online-dot">●</span>`;
            userList.appendChild(div);
        }

        iniciar();
    </script>
</body>

</html>
