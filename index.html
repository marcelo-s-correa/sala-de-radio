<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REDE RÁDIO - 1704</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .radio-container {
            background: #333;
            padding: 30px;
            border-radius: 20px;
            border: 4px solid #444;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 320px;
        }

        .display {
            background: #000;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #111;
            margin-bottom: 20px;
        }

        input {
            background: transparent;
            border: none;
            color: #0f0;
            font-family: monospace;
            font-size: 1.5rem;
            text-align: center;
            width: 100%;
            outline: none;
        }

        input::placeholder {
            color: #050;
        }

        .ptt-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: none;
            background: radial-gradient(#555, #222);
            color: #777;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 6px #000;
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        .ptt-btn.ready {
            background: radial-gradient(#e74c3c, #c0392b);
            color: white;
            box-shadow: 0 6px #992d22;
        }

        .ptt-btn.active {
            background: radial-gradient(#ff4d4d, #d32f2f) !important;
            transform: translateY(4px);
            box-shadow: 0 2px #7b1a1a !important;
            color: white;
        }

        .list-container {
            width: 100%;
            margin-top: 20px;
            text-align: left;
            font-size: 0.8rem;
            border-top: 1px solid #444;
            padding-top: 10px;
            min-height: 80px;
        }

        .user-item {
            color: #aaa;
            margin: 3px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .online-dot {
            color: #0f0;
            font-size: 1.2rem;
        }

        #status {
            color: #666;
            font-size: 0.7rem;
            margin-top: 15px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <div class="radio-container">
        <div style="font-size: 0.7rem; color: #888; margin-bottom: 10px;">CANAL: 1704</div>
        <div class="display">
            <label style="font-size: 0.7rem; color: #444; display: block; margin-bottom: 5px;">IDENTIFICAÇÃO</label>
            <input type="text" id="vtrInput" value="" placeholder="DIGITE O ID" spellcheck="false">
        </div>

        <button class="ptt-btn" id="pttBtn" disabled>PTT</button>
        <p id="status">AGUARDANDO ID...</p>

        <div class="list-container">
            <div style="font-weight: bold; margin-bottom: 5px; color: #888;">NA ESCUTA:</div>
            <div id="userList"></div>
        </div>
    </div>

    <script>
        const ccirTable = { '1': 1124, '2': 1197, '3': 1275, '4': 1358, '5': 1446, '6': 1540, '7': 1640, '8': 1747, '9': 1860, '0': 1981, 'R': 2110 };
        const SALA_BASE = "PMERJ-1704-VTR-";
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const pttBtn = document.getElementById('pttBtn');
        const vtrInput = document.getElementById('vtrInput');
        const statusText = document.getElementById('status');
        const userListDisplay = document.getElementById('userList');

        let peer = null, localStream = null, meuSlot = 0, isTransmitting = false;
        let unidadesOnline = {};

        const peerConfig = {
            config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }, { url: 'stun:stun1.l.google.com:19302' }], 'sdpSemantics': 'unified-plan' }
        };

        async function playBeep(digits) {
            const duration = 0.1;
            let startTime = audioCtx.currentTime;
            let d = digits.replace(/\D/g, '').split('');
            let processed = [];
            for (let i = 0; i < d.length; i++) { processed.push(i > 0 && d[i] === d[i - 1] ? 'R' : d[i]); }
            processed.forEach(digit => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.value = ccirTable[digit];
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.setValueAtTime(0.5, startTime + 0.002);
                gain.gain.setValueAtTime(0, startTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(startTime); osc.stop(startTime + duration);
                startTime += duration;
            });
            return new Promise(r => setTimeout(r, processed.length * 100));
        }

        async function iniciar() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                localStream.getAudioTracks()[0].enabled = false;
                statusText.innerText = "DIGITE O PREFIXO";
                vtrInput.addEventListener('input', () => {
                    if (vtrInput.value.length >= 2 && !peer) tentarOcuparSlot(1);
                });
            } catch (err) { statusText.innerText = "ERRO NO MICROFONE"; }
        }

        function tentarOcuparSlot(slot) {
            if (slot > 10) return;
            const idTentativa = SALA_BASE + slot;
            const p = new Peer(idTentativa, peerConfig);
            p.on('open', () => { peer = p; meuSlot = slot; configurarRadio(); });
            p.on('error', (err) => { if (err.type === 'unavailable-id') { p.destroy(); tentarOcuparSlot(slot + 1); } });
        }

        function configurarRadio() {
            statusText.innerText = "QAP - NA ESCUTA";
            pttBtn.disabled = false;
            pttBtn.classList.add('ready');

            // Receber Dados (Identidade) e Áudio
            peer.on('connection', conn => {
                conn.on('data', data => { unidadesOnline[conn.peer] = data; atualizarInterface(); });
            });

            peer.on('call', call => {
                call.answer(localStream);
                call.on('stream', stream => {
                    let audio = document.getElementById('audio-' + call.peer) || new Audio();
                    audio.id = 'audio-' + call.peer; audio.srcObject = stream; audio.play();
                    atualizarInterface();
                });
            });

            setInterval(() => {
                for (let i = 1; i <= 10; i++) {
                    const targetId = SALA_BASE + i;
                    if (i !== meuSlot && !unidadesOnline[targetId]) {
                        const conn = peer.connect(targetId);
                        if (conn) conn.on('open', () => conn.send(vtrInput.value));

                        const call = peer.call(targetId, localStream);
                        if (call) call.on('stream', () => {
                            unidadesOnline[targetId] = unidadesOnline[targetId] || "VTR " + i;
                            atualizarInterface();
                        });
                    }
                }
            }, 3000);
            atualizarInterface();
        }

        function atualizarInterface() {
            userListDisplay.innerHTML = "";
            addUserToUI((vtrInput.value || "VOCÊ") + " (Local)");
            Object.keys(unidadesOnline).forEach(id => { addUserToUI(unidadesOnline[id]); });
        }

        function addUserToUI(name) {
            const div = document.createElement('div');
            div.className = "user-item";
            div.innerHTML = `<span>${name}</span> <span class="online-dot">●</span>`;
            userListDisplay.appendChild(div);
        }

        const startPTT = async (e) => {
            if (isTransmitting || pttBtn.disabled) return;
            e.preventDefault(); isTransmitting = true;
            pttBtn.classList.add('active');
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            await playBeep(vtrInput.value);
            if (isTransmitting) {
                localStream.getAudioTracks()[0].enabled = true;
                statusText.innerText = "TRANSMITINDO...";
            }
        };

        const stopPTT = (e) => {
            e.preventDefault(); isTransmitting = false;
            pttBtn.classList.remove('active');
            if (localStream) localStream.getAudioTracks()[0].enabled = false;
            statusText.innerText = "QAP - NA ESCUTA";
        };

        pttBtn.addEventListener('pointerdown', startPTT);
        pttBtn.addEventListener('pointerup', stopPTT);
        pttBtn.addEventListener('pointerleave', stopPTT);

        iniciar();
    </script>
</body>

</html>
