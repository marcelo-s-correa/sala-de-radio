<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RADIO P2P - TÁTICO</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            background: #0a0a0a;
            color: #0f0;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .panel {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 15px;
            border: 2px solid #333;
            width: 300px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
        }

        .display {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #222;
            margin-bottom: 15px;
        }

        input {
            background: transparent;
            border: none;
            color: #0f0;
            font-family: monospace;
            font-size: 1.2rem;
            text-align: center;
            width: 100%;
            outline: none;
            border-bottom: 1px solid #333;
            margin-bottom: 10px;
        }

        .ptt-btn {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid #222;
            background: radial-gradient(#333, #111);
            color: #444;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
            touch-action: none;
            margin: 15px 0;
        }

        .ptt-btn.ready {
            background: radial-gradient(#e74c3c, #c0392b);
            color: white;
            border-color: #500;
        }

        .ptt-btn.active {
            background: #ff0000 !important;
            box-shadow: 0 0 20px #f00;
            transform: scale(0.98);
        }

        #status {
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <div class="panel">
        <div class="display">
            <input id="room" placeholder="NOME DA SALA">
            <input id="vtr" placeholder="ID DA UNIDADE">
        </div>

        <button id="connectBtn" onclick="entrar()"
            style="background:#0f0; border:none; padding:10px; width:100%; cursor:pointer; font-weight:bold;">SINALIZAR
            REDE</button>

        <button class="ptt-btn" id="pttBtn" disabled>OFFLINE</button>

        <p id="status">AGUARDANDO CONFIGURAÇÃO</p>
    </div>

    <script>
        // Tabela CCIR para sinalização real
        const ccirTable = { '1': 1124, '2': 1197, '3': 1275, '4': 1358, '5': 1446, '6': 1540, '7': 1640, '8': 1747, '9': 1860, '0': 1981, 'R': 2110 };
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        let peer, localStream, myId, myRoom, myVtr;
        let connections = {};

        function log(msg) { document.getElementById('status').innerText = msg; }

        async function playBeep(digits) {
            const duration = 0.1;
            let startTime = audioCtx.currentTime;
            let d = digits.replace(/\D/g, '').split('');
            let processed = d.map((val, i) => (i > 0 && val === d[i - 1] ? 'R' : val));

            processed.forEach(digit => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.value = ccirTable[digit] || 1000;
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.setValueAtTime(0.4, startTime + 0.002);
                gain.gain.setValueAtTime(0, startTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(startTime); osc.stop(startTime + duration);
                startTime += duration;
            });
            return new Promise(r => setTimeout(r, processed.length * 110));
        }

        async function entrar() {
            myRoom = document.getElementById('room').value.trim().toUpperCase();
            myVtr = document.getElementById('vtr').value.trim();

            if (!myRoom || !myVtr) return log("ERRO: PREENCHA OS CAMPOS");

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                localStream.getAudioTracks()[0].enabled = false; // Começa mutado
            } catch (e) { return log("ERRO: PERMITA O MICROFONE"); }

            // Lógica de Slot: Tenta IDs de 1 a 5 na sala para se encontrarem
            tentarSlot(1);
        }

        function tentarSlot(slot) {
            if (slot > 5) return log("SALA LOTADA");

            const tentativaId = `${myRoom}-SLOT-${slot}`;
            const p = new Peer(tentativaId, { debug: 1 });

            p.on('open', id => {
                peer = p;
                myId = id;
                log("CONECTADO NO SLOT " + slot);
                configurarRadio();
            });

            p.on('error', err => {
                if (err.type === 'unavailable-id') {
                    p.destroy();
                    tentarSlot(slot + 1);
                } else {
                    log("ERRO DE REDE");
                }
            });
        }

        function configurarRadio() {
            const pttBtn = document.getElementById('pttBtn');
            pttBtn.disabled = false;
            pttBtn.classList.add('ready');
            pttBtn.innerText = "PTT";

            peer.on('call', call => {
                call.answer(localStream);
                vincularAudio(call);
            });

            // Tenta conectar nos outros slots da sala
            setInterval(() => {
                for (let i = 1; i <= 5; i++) {
                    const targetId = `${myRoom}-SLOT-${i}`;
                    if (targetId !== myId && !connections[targetId]) {
                        const call = peer.call(targetId, localStream);
                        if (call) vincularAudio(call);
                    }
                }
            }, 5000);
        }

        function vincularAudio(call) {
            connections[call.peer] = call;
            call.on('stream', stream => {
                const audio = new Audio();
                audio.srcObject = stream;
                audio.play();
            });
            call.on('close', () => delete connections[call.peer]);
        }

        // --- LÓGICA DE PTT COM BEEP CCIR ---
        const pttBtn = document.getElementById('pttBtn');

        pttBtn.addEventListener('pointerdown', async (e) => {
            e.preventDefault();
            if (pttBtn.disabled) return;

            pttBtn.classList.add('active');
            log("SINALIZANDO...");

            if (audioCtx.state === 'suspended') await audioCtx.resume();

            // Toca o Beep ID antes de abrir o microfone
            await playBeep(myVtr);

            localStream.getAudioTracks()[0].enabled = true;
            log("TRANSMITINDO...");
        });

        window.addEventListener('pointerup', () => {
            if (!peer) return;
            pttBtn.classList.remove('active');
            localStream.getAudioTracks()[0].enabled = false;
            log("QAP - NA ESCUTA");
        });

    </script>
</body>

</html>
