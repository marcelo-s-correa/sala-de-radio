<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REDE RÁDIO - 1704</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .radio-container {
            background: #333;
            padding: 30px;
            border-radius: 20px;
            border: 4px solid #444;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 320px;
        }

        .display {
            background: #000;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #111;
            margin-bottom: 20px;
        }

        input {
            background: transparent;
            border: none;
            color: #0f0;
            font-family: monospace;
            font-size: 1.5rem;
            text-align: center;
            width: 100%;
            outline: none;
        }

        .ptt-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: radial-gradient(#e74c3c, #c0392b);
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px #992d22;
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .ptt-btn:active {
            box-shadow: 0 2px #992d22;
            transform: translateY(4px);
            background: radial-gradient(#c0392b, #a93226);
        }

        .ptt-btn:disabled {
            background: #555;
            box-shadow: none;
            cursor: not-allowed;
        }

        .list-container {
            width: 100%;
            margin-top: 20px;
            text-align: left;
            font-size: 0.8rem;
            border-top: 1px solid #444;
            padding-top: 10px;
            min-height: 80px;
        }

        .user-item {
            color: #aaa;
            margin: 3px 0;
            display: flex;
            justify-content: space-between;
        }

        .online-dot {
            color: #0f0;
        }

        #status {
            color: #666;
            font-size: 0.7rem;
            margin-top: 15px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <div class="radio-container">
        <div style="font-size: 0.7rem; color: #888; margin-bottom: 10px;">CANAL: <span id="roomDisplay">1704</span>
        </div>
        <div class="display">
            <label style="font-size: 0.7rem; color: #444; display: block; margin-bottom: 5px;">IDENTIFICAÇÃO</label>
            <input type="text" id="vtrInput" value="54-7967">
        </div>

        <button class="ptt-btn" id="pttBtn" disabled>CONECTANDO</button>
        <p id="status">INICIANDO REDE...</p>

        <div class="list-container">
            <div style="font-weight: bold; margin-bottom: 5px; color: #888;">NA ESCUTA (MÁX 5):</div>
            <div id="userList"></div>
        </div>
    </div>

    <script>
        const ccirTable = { '1': 1124, '2': 1197, '3': 1275, '4': 1358, '5': 1446, '6': 1540, '7': 1640, '8': 1747, '9': 1860, '0': 1981, 'R': 2110 };
        const SALA_BASE = "PMERJ-1704-SLOT-";
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        const pttBtn = document.getElementById('pttBtn');
        const vtrInput = document.getElementById('vtrInput');
        const statusText = document.getElementById('status');
        const userListDisplay = document.getElementById('userList');

        let peer = null;
        let localStream;
        let meuSlot = 0;
        let conexoesAtivas = {};

        const peerConfig = {
            config: {
                'iceServers': [
                    { url: 'stun:stun.l.google.com:19302' },
                    { url: 'stun:stun1.l.google.com:19302' }
                ]
            }
        };

        async function playSelCall(digits) {
            const duration = 0.1;
            let startTime = audioCtx.currentTime;
            let cleanDigits = digits.replace(/\D/g, '').split('');
            let processed = [];
            for (let i = 0; i < cleanDigits.length; i++) {
                processed.push(i > 0 && cleanDigits[i] === cleanDigits[i - 1] ? 'R' : cleanDigits[i]);
            }
            processed.forEach(digit => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.value = ccirTable[digit];
                osc.type = 'sine';
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.setValueAtTime(0.5, startTime + 0.002);
                gain.gain.setValueAtTime(0.5, startTime + duration - 0.002);
                gain.gain.setValueAtTime(0, startTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(startTime);
                osc.stop(startTime + duration);
                startTime += duration;
            });
            return new Promise(resolve => setTimeout(resolve, processed.length * 100));
        }

        async function iniciar() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                statusText.innerText = "BUSCANDO VAGA...";
                tentarOcuparSlot(1);
            } catch (err) {
                statusText.innerText = "ERRO: PERMITA O MICROFONE";
            }
        }

        function tentarOcuparSlot(slot) {
            if (slot > 5) {
                statusText.innerText = "SALA CHEIA";
                return;
            }
            const idTentativa = SALA_BASE + slot;
            const p = new Peer(idTentativa, peerConfig);

            p.on('open', (id) => {
                peer = p;
                meuSlot = slot;
                configurarRadio();
            });

            p.on('error', (err) => {
                p.destroy();
                tentarOcuparSlot(slot + 1);
            });
        }

        function configurarRadio() {
            statusText.innerText = "ONLINE - SLOT " + meuSlot;
            pttBtn.innerText = "PTT";
            pttBtn.disabled = false;
            atualizarLista();

            peer.on('call', call => {
                call.answer(localStream);
                call.on('stream', stream => {
                    const audioId = 'audio-' + call.peer;
                    if (!document.getElementById(audioId)) {
                        const audio = new Audio();
                        audio.id = audioId;
                        audio.srcObject = stream;
                        audio.play();
                    }
                });
            });

            // Tenta conectar em todos os slots a cada 3 segundos
            setInterval(() => {
                for (let i = 1; i <= 5; i++) {
                    const targetId = SALA_BASE + i;
                    if (i !== meuSlot && !conexoesAtivas[targetId]) {
                        const call = peer.call(targetId, localStream);
                        if (call) {
                            conexoesAtivas[targetId] = true;
                            call.on('stream', stream => {
                                const audioId = 'audio-' + targetId;
                                if (!document.getElementById(audioId)) {
                                    const audio = new Audio();
                                    audio.id = audioId;
                                    audio.srcObject = stream;
                                    audio.play();
                                }
                            });
                            call.on('close', () => delete conexoesAtivas[targetId]);
                            call.on('error', () => delete conexoesAtivas[targetId]);
                        }
                    }
                }
                atualizarLista();
            }, 3000);
        }

        function atualizarLista() {
            userListDisplay.innerHTML = "";
            addUserToUI(vtrInput.value + " (Você)");
            Object.keys(conexoesAtivas).forEach(id => {
                const slotNum = id.replace(SALA_BASE, "");
                addUserToUI("Unidade " + slotNum);
            });
        }

        function addUserToUI(name) {
            const div = document.createElement('div');
            div.className = "user-item";
            div.innerHTML = `<span>${name}</span> <span class="online-dot">●</span>`;
            userListDisplay.appendChild(div);
        }

        pttBtn.addEventListener('mousedown', async () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            await playSelCall(vtrInput.value);
            statusText.innerText = "TRANSMITINDO...";
            statusText.style.color = "#e74c3c";
        });

        pttBtn.addEventListener('mouseup', () => {
            statusText.innerText = "PRONTO";
            statusText.style.color = "#666";
        });

        iniciar();
    </script>
</body>

</html>
